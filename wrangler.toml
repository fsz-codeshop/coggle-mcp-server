name = "coggle-mcp-server"
main = "build/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Let Wrangler build before dev/publish
[build]
command = "npm run build"
watch_dir = ["src"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CoggleMCP"]

[vars]
MCP_SERVER_NAME = "coggle-mcp-server"

[observability]
enabled = true

[env.production]
name = "coggle-mcp-server"

[env.production.durable_objects]
bindings = [{ name = "MCP_OBJECT", class_name = "CoggleMCP" }]

[env.production.vars]
MCP_SERVER_NAME = "coggle-mcp-server"

# Secrets to set per environment (via CLI, not in this file):
# - COGGLE_API_TOKEN
# - BEARER_TOKEN
